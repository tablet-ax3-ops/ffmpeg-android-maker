name: Build FFmpeg GoPro Optimized Quarterly Release

on:
  # 1. Avvio ogni 3 mesi (il 1° giorno dei mesi 1, 4, 7, 10 alle 00:00)
  schedule:
    - cron: '0 0 1 */3 *'
  
  # 2. Manteniamo l'avvio manuale per i test
  workflow_dispatch:

permissions:
  contents: write # Obbligatorio per permettere alla Action di creare la Release

jobs:
  build:
    name: Build and Release arm64-v8a
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install -y meson nasm ninja-build build-essential pkg-config

      - name: Run Build Script
        run: |
          export ANDROID_SDK_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          ./ffmpeg-android-maker.sh -android=33 -abis=arm64-v8a

      # Generiamo un nome per il tag basato sulla data attuale
      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
      
      # Crea il version file ffmpeg-version.txt
      - name: Create Version File
        run: echo "${{ steps.tag.outputs.release_tag }}" > ffmpeg-version.txt
      
      # Comprimiamo l'output in uno zip per la release
      - name: Archive Output
        run: |
          cd output
          zip -r ../ffmpeg-gopro-android.zip .

      # 3. Creazione della Release su GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: FFmpeg GoPro Release ${{ steps.tag.outputs.release_tag }}
          body: |
            Build automatica trimestrale di FFmpeg ottimizzata per GoPro HEVC 10-bit.
            - Architettura: arm64-v8a
            - Ottimizzazioni: NEON ASM, LTO, Fast-Math.
            - Decoder: HEVC (Main 10)
          draft: false
          prerelease: false
          files: |
            ffmpeg-gopro-android.zip
            ffmpeg-version.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          
