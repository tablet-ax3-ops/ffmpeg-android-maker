name: Build FFmpeg GoPro (Extreme Optimization)

on:
  # Avvio automatico disabilitato per risparmiare risorse
  # push:
  #   branches: [ master, main ]
  
  # Avvio manuale dalla tab Actions
  workflow_dispatch:

jobs:
  build:
    name: Build arm64-v8a
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment (Tools)
        run: |
          sudo apt update
          sudo apt install -y meson nasm ninja-build build-essential pkg-config

      - name: Run Build Script
        run: |
          # Utilizziamo l'ambiente Android preconfigurato di GitHub
          export ANDROID_SDK_HOME=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          
          # Compilazione specifica: Android API 24+, solo 64-bit
          ./ffmpeg-android-maker.sh -android=24 -abis=arm64-v8a

      - name: Upload FFmpeg Binaries
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-gopro-android-libs
          path: output/
          if-no-files-found: error
          
